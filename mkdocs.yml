site_name: Notes
site_url: https://spatialthoughts.github.io/notes/
docs_dir: content

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home:
    - index.md
    - QGIS: QGIS.md
    - PyQGIS: PyQGIS.md
    - GEE: GEE.md
    - STAC: STAC.md
    - Web Mapping: Web_Mapping.md
    - Cartography: Cartography.md
    - Remote Sensing: Remote_Sensing.md
    - Python: Python.md
    - SQL: SQL.md
    - XArray: XArray.md
    - Data: Data.md
    - Git: Git.md
    - AI: AI.md
    - Machine Learning: Machine_Learning.md
    - Deep Learning: Deep_Learning.md
    - Embeddings: Embeddings.md
    - Claude Code: Claude_Code.md
    - Climate: Climate.md
    - Agriculture: Agriculture.md
    - Water Resources: Water_Resources.md
    - Urban Planning: Urban_Planning.md
    - Papers: Papers.md
    - Miscellaneous: Misc.md
